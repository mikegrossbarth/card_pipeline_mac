<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="LUCAS">
    <title>LUCAS Mobile</title>
    <link rel="manifest" href="/mobile/manifest.webmanifest">
    <link rel="stylesheet" href="/mobile/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">L.U.C.A.S</p>
        <h1>Inventory</h1>
      </div>
      <button id="installHelp" class="iconButton" type="button" aria-label="Install">+</button>
    </header>

    <main>
      <section id="authPanel" class="panel">
        <label for="pin">Mobile PIN</label>
        <div class="inline">
          <input id="pin" inputmode="numeric" autocomplete="one-time-code" placeholder="6 digits">
          <button id="savePin" type="button">Unlock</button>
        </div>
        <p class="hint">The PIN is shown in the LUCAS desktop bridge status line.</p>
      </section>

      <section id="appPanel" class="hidden">
        <nav class="tabs" aria-label="Inventory actions">
          <button class="tab active" data-view="search" type="button">Search</button>
          <button class="tab" data-view="add" type="button">Add</button>
        </nav>

        <section id="searchView" class="view">
          <div class="searchRow">
            <input id="searchInput" placeholder="Cert, player, card, seller">
            <button id="scanSearch" type="button">Scan Photo</button>
          </div>
          <div id="scanSearchStatus" class="status"></div>
          <label class="checkLine"><input id="includeSold" type="checkbox"> Include inactive/sold</label>
          <div id="results" class="results"></div>
        </section>

        <section id="addView" class="view hidden">
          <div class="scanBlock">
            <input id="certNumber" inputmode="numeric" placeholder="Cert number">
            <button id="scanAdd" type="button">Scan Photo</button>
          </div>
          <div id="scanAddStatus" class="status"></div>
          <div class="grid">
            <label>Grader<input id="grader" placeholder="PSA"></label>
            <label>Purchase<input id="purchasePrice" inputmode="decimal" placeholder="0.00"></label>
            <label>Card<input id="cardTitle" placeholder="Year set player grade"></label>
            <label>Person<input id="assignedPerson" placeholder="Owner/person"></label>
            <label>Seller/source<input id="source" placeholder="Mobile"></label>
            <label>Value<input id="inventoryValue" inputmode="decimal" placeholder="Optional"></label>
            <label>Notes<textarea id="notes" rows="3"></textarea></label>
          </div>
          <button id="addInventory" class="primary" type="button">Add Inventory</button>
          <button id="updateDuplicate" class="secondary hidden" type="button">Update Existing</button>
          <div id="addStatus" class="status"></div>
        </section>
      </section>
    </main>

    <dialog id="scannerDialog">
      <video id="scannerVideo" playsinline muted></video>
      <div class="dialogBar">
        <span id="scannerStatus">Point camera at barcode</span>
        <button id="closeScanner" type="button">Close</button>
      </div>
    </dialog>
    <input id="photoInput" class="hidden" type="file" accept="image/*" capture="environment">

    <script src="/mobile/app.js" defer></script>
  </body>
</html>
